<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alerta de Prazo</title>
  </head>
  <body style="margin:0; padding:0; background:#f1f5f9; font-family:Arial,Helvetica,sans-serif; color:#0f172a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f1f5f9; padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="620" cellspacing="0" cellpadding="0" style="background:#ffffff; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden;">
            <tr>
              <td style="background:#0f172a; padding:18px 24px;">
                <img src="{{logo_url}}" alt="M&P Consultoria" style="max-height:44px; display:block;" />
              </td>
            </tr>
            <tr>
              <td style="padding:24px;">
                <h2 style="margin:0 0 10px 0; font-size:22px; color:#0f172a;">Alerta de Prazo: Ação Requerida</h2>
                <p style="margin:0 0 14px 0; font-size:14px; color:#334155;">
                  Empresa: <strong>{{empresa_nome}}</strong>
                </p>
                <p style="margin:0 0 12px 0; font-size:15px; line-height:1.5;">
                  {{mensagem_alerta}}
                </p>
                <p style="margin:0 0 20px 0; font-size:13px; color:#64748b;">
                  Severidade do alerta: <strong>{{severidade}}</strong>
                </p>
                <a
                  href="{{app_url}}"
                  style="display:inline-block; background:#2563eb; color:#ffffff; text-decoration:none; font-weight:700; font-size:14px; padding:12px 18px; border-radius:8px;"
                >
                  Acessar Painel de Controle
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 24px; border-top:1px solid #e2e8f0; font-size:12px; color:#64748b;">
                M&amp;P Consultoria Trabalhista Inteligente<br />
                Este é um alerta automático de prazo operacional.<br />
                <a href="#" style="color:#2563eb; text-decoration:none;">Gerenciar preferências de notificação</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
