# Produção (Render, headless). Porta pública: passe no start, ex. --server.port=$PORT
# Recomendado no Render: variável STREAMLIT_SERVER_COOKIE_SECRET (valor forte e aleatório).

[global]
developmentMode = false

[browser]
gatherUsageStats = false

[server]
headless = true
address = "0.0.0.0"
port = 8501
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 50
enableStaticServing = false

[runner]
fastReruns = false
